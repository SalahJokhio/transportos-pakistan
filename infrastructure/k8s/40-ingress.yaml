apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: transportos
  namespace: transportos
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [app.transportos.pk, api.transportos.pk]
      secretName: transportos-tls
  rules:
    - host: api.transportos.pk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 80 } }
    - host: app.transportos.pk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
