apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: transportos
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/salahjokhio/transportos-frontend:latest
          ports:
            - containerPort: 4000
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /, port: 4000 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: transportos
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 4000
