name: CI

on:
  push:
    branches: [master, 'feat/**', 'fix/**']
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend — typecheck, build, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Typecheck (api-gateway)
        run: npx tsc -p apps/api-gateway/tsconfig.app.json --noEmit
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test

  frontend:
    name: Frontend — typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://backend-production-d926.up.railway.app/api/v1
