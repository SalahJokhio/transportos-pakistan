org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Project is on D: but Gradle/SDK caches are on C: — Kotlin's incremental
# compiler can't relativize paths across drive roots on Windows ("this and base
# files have different roots"). Disable incremental + run the compiler in-process
# to avoid the cross-drive crash.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
